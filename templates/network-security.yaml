AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with 2 Public and 2 Private Subnets, Internet Gateway, and Route Tables'

Parameters:
    EnvironmentName:
        Type: String
        Default: wordpress
        Description: Environment name for resource naming
  
    VpcCIDR:
        Type: String
        Default: 10.0.0.0/16
        Description: CIDR block for VPC
    
    PublicSubnet1CIDR:
        Type: String
        Default: 10.0.1.0/24
        Description: CIDR for Public Subnet 1 (AZ1)
  
    PublicSubnet2CIDR:
        Type: String
        Default: 10.0.2.0/24
        Description: CIDR for Public Subnet 2 (AZ2)
  
    PrivateSubnet1CIDR:
        Type: String
        Default: 10.0.3.0/24
        Description: CIDR for Private Subnet 1 (AZ1)
  
    PrivateSubnet2CIDR:
        Type: String
        Default: 10.0.4.0/24
        Description: CIDR for Private Subnet 2 (AZ2)

Resources:

    # ========================================
    # 1. VPC
    # ========================================
    VPC:
        Type: AWS::EC2::VPC
        Properties:
            CidrBlock: !Ref VpcCIDR
            EnableDnsHostnames: true
            EnableDnsSupport: true
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-vpc'

    # ========================================
    # 2. Public Subnets
    # ========================================    
    PublicSubnet1:
        Type: AWS::EC2::Subnet
        Properties:
            VpcId: !Ref VPC
            CidrBlock: !Ref PublicSubnet1CIDR
            AvailabilityZone: !Select [0, !GetAZs '']
            MapPublicIpOnLaunch: true
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-public-subnet-1'

    PublicSubnet2:
        Type: AWS::EC2::Subnet
        Properties:
            VpcId: !Ref VPC
            CidrBlock: !Ref PublicSubnet2CIDR
            AvailabilityZone: !Select [1, !GetAZs '']
            MapPublicIpOnLaunch: true
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-public-subnet-2'

    # ========================================
    # 3. Private Subnets
    # ========================================
    PrivateSubnet1:
        Type: AWS::EC2::Subnet
        Properties:
            VpcId: !Ref VPC
            CidrBlock: !Ref PrivateSubnet1CIDR
            AvailabilityZone: !Select [0, !GetAZs '']
            MapPublicIpOnLaunch: false
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-private-subnet-1'

    PrivateSubnet2:
        Type: AWS::EC2::Subnet
        Properties:
            VpcId: !Ref VPC
            CidrBlock: !Ref PrivateSubnet2CIDR
            AvailabilityZone: !Select [1, !GetAZs '']
            MapPublicIpOnLaunch: false
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-private-subnet-2'

    # ========================================
    # 4. Internet Gateway
    # ========================================
    InternetGateway:
        Type: AWS::EC2::InternetGateway
        Properties:
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-igw'


    VPCGatewayAttachment:
        Type: AWS::EC2::VPCGatewayAttachment
        Properties:
            VpcId: !Ref VPC
            InternetGatewayId: !Ref InternetGateway

    # ========================================
    # 5. Route Tables
    # ========================================
    PublicRouteTable:
        Type: AWS::EC2::RouteTable
        Properties:
            VpcId: !Ref VPC
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-public-rt'

    PublicRoute:
        Type: AWS::EC2::Route
        Properties:
            RouteTableId: !Ref PublicRouteTable
            DestinationCidrBlock: 0.0.0.0/0
            GatewayId: !Ref InternetGateway 
        DependsOn: VPCGatewayAttachment
    
    PrivateRouteTable1:
        Type: AWS::EC2::RouteTable
        Properties:
            VpcId: !Ref VPC
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-private-rt-1'
    
    PrivateRouteTable2:
        Type: AWS::EC2::RouteTable
        Properties:
            VpcId: !Ref VPC
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-private-rt-2'

    # ========================================
    # 6. Route Table Associations
    # ========================================
    PublicSubnet1RouteTableAssociation:
        Type: AWS::EC2::SubnetRouteTableAssociation
        Properties:
            SubnetId: !Ref PublicSubnet1
            RouteTableId: !Ref PublicRouteTable

    PublicSubnet2RouteTableAssociation:
        Type: AWS::EC2::SubnetRouteTableAssociation
        Properties:
            SubnetId: !Ref PublicSubnet2
            RouteTableId: !Ref PublicRouteTable

    PrivateSubnet1RouteTableAssociation:
        Type: AWS::EC2::SubnetRouteTableAssociation
        Properties:
            SubnetId: !Ref PrivateSubnet1
            RouteTableId: !Ref PrivateRouteTable1

    PrivateSubnet2RouteTableAssociation:
        Type: AWS::EC2::SubnetRouteTableAssociation
        Properties:
            SubnetId: !Ref PrivateSubnet2
            RouteTableId: !Ref PrivateRouteTable2
    
    # ========================================
    # 1. Web Server Security Group (EC2)
    # ========================================
    WebServerSG:
        Type: AWS::EC2::SecurityGroup
        Properties:
            GroupDescription: Web Server Security Group
            VpcId: !Ref VPC

            SecurityGroupIngress:
                # SSH 
                - IpProtocol: tcp
                  FromPort: 22
                  ToPort: 22
                  CidrIp: 0.0.0.0/0
                  Description: SSH Access

                # HTTP
                - IpProtocol: tcp
                  FromPort: 80
                  ToPort: 80
                  CidrIp: 0.0.0.0/0
                  Description: HTTP Access

                - IpProtocol: tcp
                  FromPort: 443
                  ToPort: 443
                  CidrIp: 0.0.0.0/0
                  Description: HTTPS Access

            SecurityGroupEgress:
                - IpProtocol: -1
                  CidrIp: 0.0.0.0/0
                  Description: Allow all outbound traffic
                
            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-web-sg'

    # =====================================================
    # Database Security Group
    # =====================================================
    DatabaseSG:
        Type: AWS::EC2::SecurityGroup
        Properties:
            GroupDescription: Security Group for MySQL Database
            VpcId: !Ref VPC

            SecurityGroupIngress:

                # MySQL only from Web Server SG
                - IpProtocol: tcp
                  FromPort: 3306
                  ToPort: 3306
                  SourceSecurityGroupId: !Ref WebServerSG
                  Description: MySQL access from Web Server

            SecurityGroupEgress:

                - IpProtocol: -1
                  CidrIp: 0.0.0.0/0
                  Description: Allow all outbound traffic

            Tags:
                - Key: Name
                  Value: !Sub '${EnvironmentName}-db-sg'

# ========================================
# 8. Outputs (für andere Stacks)
# ========================================
Outputs:
    VPC:
        Description: VPC ID
        Value: !Ref VPC
        Export:
            Name: !Sub '${EnvironmentName}-VPC'

    PublicSubnet1:
        Description: Public Subnet 1 ID
        Value: !Ref PublicSubnet1
        Export:
            Name: !Sub '${EnvironmentName}-PublicSubnet1'

    PublicSubnet2:
        Description: Public Subnet 2 ID
        Value: !Ref PublicSubnet2
        Export:
            Name: !Sub '${EnvironmentName}-PublicSubnet2'

    PrivateSubnet1:
        Description: Private Subnet 1 ID
        Value: !Ref PrivateSubnet1
        Export:
            Name: !Sub '${EnvironmentName}-PrivateSubnet1'

    PrivateSubnet2:
        Description: Private Subnet 2 ID
        Value: !Ref PrivateSubnet2
        Export:
            Name: !Sub '${EnvironmentName}-PrivateSubnet2'

    PublicRouteTable:
        Description: Public Route Table ID
        Value: !Ref PublicRouteTable
        Export:
            Name: !Sub '${EnvironmentName}-PublicRouteTable'

    PrivateRouteTable1:
        Description: Private Route Table 1 ID
        Value: !Ref PrivateRouteTable1
        Export:
            Name: !Sub '${EnvironmentName}-PrivateRouteTable1'

    PrivateRouteTable2:
        Description: Private Route Table 2 ID
        Value: !Ref PrivateRouteTable2
        Export:
            Name: !Sub '${EnvironmentName}-PrivateRouteTable2'

    WebServerSG:
        Description: Web Server Security Group ID
        Value: !Ref WebServerSG
        Export:
            Name: !Sub '${EnvironmentName}-WebServerSG'

    DatabaseSG:
        Description: Database Security Group ID
        Value: !Ref DatabaseSG
        Export:
          Name: !Sub '${EnvironmentName}-DatabaseSG'