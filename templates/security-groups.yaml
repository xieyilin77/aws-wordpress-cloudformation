
AWSTemplateFormatVersion: '2010-09-09'
Description: 'Security Groups for WordPress Application'

Parameters:
  EnvironmentName:
    Type: String
    Default: wordpress
    Description: Environment name for resource naming

Resources:
  # ========================================
  # 1. Web Server Security Group (EC2)
  # ========================================
  WebServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-web-sg'
      GroupDescription: Web Server Security Group
      VpcId: 
        Fn::ImportValue:
          !Sub '${EnvironmentName}-VPC'

      SecurityGroupIngress:
        # SSH 
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH Access

        # HTTP
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP Access

        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS Access

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
         
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-web-sg'

  # =====================================================
  # Database Security Group
  # =====================================================
  DatabaseSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-db-sg'
      GroupDescription: Security Group for MySQL Database
      VpcId: 
        Fn::ImportValue: !Sub '${EnvironmentName}-VPC'

      SecurityGroupIngress:

        # MySQL only from Web Server SG
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref WebServerSG
          Description: MySQL access from Web Server

      SecurityGroupEgress:

        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-db-sg'

# ========================================
# OUTPUTS
# ========================================
Outputs:
    WebServerSG:
        Description: Web Server Security Group ID
        Value: !Ref WebServerSG
        Export:
            Name: !Sub ${EnvironmentName}-WebServerSG

    DatabaseSG:
        Description: Database Security Group ID
        Value: !Ref DatabaseSG
        Export:
          Name: !Sub '${EnvironmentName}-DatabaseSG'